<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Devis assurance temporaire — Tempo-Assurance</title>
<style>
  :root {
    --ink:#0F172A; --ink-soft:#334155; --muted:#64748B; --faint:#94A3B8;
    --line:#E7EBF0; --surface:#FFFFFF; --wash:#F6F8FB;
    --gold:#B7791F; --gold-soft:#FBF1DC;
    --green:#15803D; --green-soft:#ECFDF3; --green-line:#A7F3D0;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; color:var(--ink); background:transparent; -webkit-font-smoothing:antialiased; }

  .card { max-width:520px; margin:0 auto; background:var(--surface); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 1px 2px rgba(15,23,42,.04), 0 10px 30px rgba(15,23,42,.08); }
  .accent { height:3px; background:linear-gradient(90deg,var(--gold) 0%,#DCA83A 60%,var(--gold) 100%); }
  .pad { padding:20px 22px; }

  /* Header */
  .top { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .brand { display:flex; align-items:center; gap:7px; font-size:.72rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .brand b { color:var(--ink); }
  .brand .tick { width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 3px var(--gold-soft); }
  .cat { margin:12px 0 0; font-size:1.15rem; font-weight:800; letter-spacing:-.01em; line-height:1.2; }

  /* Price */
  .price-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; min-height:46px; margin:14px 0 0; }
  .price { font-size:2.35rem; font-weight:800; letter-spacing:-.03em; line-height:1; color:var(--ink); font-variant-numeric:tabular-nums; transition:opacity .18s ease; }
  .price.loading { opacity:.3; }
  .per { color:var(--muted); font-size:.95rem; font-variant-numeric:tabular-nums; }
  .badge { display:inline-flex; align-items:center; gap:5px; font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; padding:4px 9px; border-radius:999px; white-space:nowrap; }
  .badge.real { background:var(--green-soft); color:var(--green); border:1px solid var(--green-line); }
  .badge.ind { background:var(--gold-soft); color:var(--gold); border:1px solid #F1DDB0; }
  .cover { color:var(--ink-soft); font-size:.86rem; margin:8px 0 0; }

  /* Duration — the signature control */
  .field { margin:20px 0 0; }
  .field-label { font-size:.72rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin:0 0 9px; }
  .segs { display:flex; flex-wrap:wrap; gap:7px; }
  .seg { position:relative; font:inherit; font-size:.9rem; font-weight:700; font-variant-numeric:tabular-nums; color:var(--ink-soft); background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:8px 12px; cursor:pointer; transition:border-color .12s, background .12s, color .12s, transform .06s; }
  .seg:hover { background:var(--wash); border-color:#D3DBE6; }
  .seg:active { transform:translateY(1px); }
  .seg[aria-pressed="true"] { background:var(--ink); border-color:var(--ink); color:#fff; }
  .seg[aria-pressed="true"]::after { content:""; position:absolute; left:12px; right:12px; bottom:5px; height:2px; border-radius:2px; background:var(--gold); }
  .seg:focus-visible { outline:none; box-shadow:0 0 0 3px rgba(183,121,31,.35); border-color:var(--gold); }

  /* Trust */
  .trust { display:flex; flex-wrap:wrap; gap:8px 16px; margin:18px 0 0; padding:14px 0 0; border-top:1px solid var(--line); }
  .trust span { display:inline-flex; align-items:center; gap:7px; font-size:.84rem; color:var(--ink-soft); }
  .trust svg { flex:none; width:15px; height:15px; color:var(--green); }

  /* CTA */
  .cta { display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; background:var(--ink); color:#fff; font-weight:800; font-size:.98rem; letter-spacing:.01em; padding:14px 18px; border-radius:12px; margin:18px 0 0; transition:background .15s, transform .06s; }
  .cta:hover { background:#1E293B; }
  .cta:active { transform:translateY(1px); }
  .cta:focus-visible { outline:none; box-shadow:0 0 0 3px rgba(183,121,31,.4); }
  .cta .arw { transition:transform .15s; }
  .cta:hover .arw { transform:translateX(3px); }

  .note { color:var(--faint); font-size:.76rem; line-height:1.55; margin:11px 0 0; }

  /* States */
  .empty, .hp { color:var(--ink-soft); }
  .hp h2 { color:var(--ink); font-size:1.1rem; margin:2px 0 6px; font-weight:800; }
  .hp .sub { color:var(--muted); font-size:.9rem; margin:0; }
  .callbtn { display:inline-flex; align-items:center; gap:8px; margin:14px 0 0; text-decoration:none; font-weight:700; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:10px 14px; }
  .callbtn svg { width:15px; height:15px; color:var(--gold); }

  @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
</style>
</head>
<body>
<div id="app" class="card"><div class="accent"></div><div class="pad"><p class="cover">Chargement du devis…</p></div></div>

<script>
  var SAMPLE = {
    source: 'jlassure_api', categorie: 'Voiture (VP)',
    tarif: { duree: 15, prix_vente: '118,67 €', prix_reel: true },
    durees_disponibles: [1, 2, 3, 5, 7, 10, 15, 30, 45, 60, 90],
    lien_devis_pre_rempli: 'https://www.tempo-assurance.com/devis-ou-souscription.html?categorie_vehi=VL-VL&duree=15',
    echo_args: { categorie_vehi: 'VL-VL', puissance: 'inf30', age_vehicule: 'moins10', age_conducteur: 35, duree: 15 }
  };

  var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  var lastData = null;

  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
  function pickPrice(d) {
    if (d.tarif && d.tarif.prix_vente) return { price: d.tarif.prix_vente, real: true, duree: d.tarif.duree };
    if (d.tarif_indicatif && d.tarif_indicatif.prix_indicatif) return { price: d.tarif_indicatif.prix_indicatif, real: false, duree: d.tarif_indicatif.duree };
    return null;
  }

  function render(d) {
    if (!d) return;
    lastData = d;
    var app = document.getElementById('app');

    if (d.hors_perimetre) {
      app.innerHTML = '<div class="accent"></div><div class="pad hp">' +
        '<div class="brand"><span class="tick"></span><b>Tempo</b>-Assurance</div>' +
        '<h2>Profil hors périmètre</h2>' +
        '<p class="sub">' + esc(d.message || "Ce profil n'est pas tarifiable en ligne.") + '</p>' +
        '<a class="callbtn" href="tel:+33978310293"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.5 2.1L8 11.5a16 16 0 0 0 6 6l1-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.7 2Z"/></svg>Nous appeler — 09 78 31 02 93</a>' +
        '</div>';
      return;
    }

    var p = pickPrice(d);
    var cat = d.categorie || 'Assurance temporaire';
    var badge = p ? (p.real
      ? '<span class="badge real">' + CHECK + 'Prix réel</span>'
      : '<span class="badge ind">Tarif indicatif</span>') : '';
    var durees = Array.isArray(d.durees_disponibles) ? d.durees_disponibles : [];
    var sel = p ? Number(p.duree) : null;
    var link = d.lien_devis_pre_rempli || '#';

    var priceBlock = p
      ? '<div class="price-row"><span class="price">' + esc(p.price) + '</span>' +
        '<span class="per">pour ' + esc(p.duree) + ' jour' + (Number(p.duree) > 1 ? 's' : '') + '</span>' + badge + '</div>' +
        '<p class="cover">Responsabilité civile + Défense et Recours, frais de courtage inclus.</p>'
      : '<p class="cover empty">Choisissez une durée pour afficher votre tarif.</p>';

    var segs = durees.map(function (n) {
      var on = Number(n) === sel;
      return '<button type="button" class="seg" role="radio" data-duree="' + esc(n) + '" aria-pressed="' + (on ? 'true' : 'false') + '" aria-checked="' + (on ? 'true' : 'false') + '" tabindex="' + (on ? '0' : '-1') + '">' + esc(n) + ' j</button>';
    }).join('');

    app.innerHTML =
      '<div class="accent"></div>' +
      '<div class="pad">' +
        '<div class="top"><div class="brand"><span class="tick"></span><b>Tempo</b>-Assurance</div></div>' +
        '<div class="cat">' + esc(cat) + '</div>' +
        priceBlock +
        (segs ? '<div class="field"><div class="field-label">Durée</div><div class="segs" role="radiogroup" aria-label="Durée du contrat">' + segs + '</div></div>' : '') +
        '<div class="trust">' +
          '<span>' + CHECK + 'Attestation immédiate</span>' +
          '<span>' + CHECK + 'Sans engagement</span>' +
          '<span>' + CHECK + 'Paiement sécurisé (CIC)</span>' +
        '</div>' +
        '<a class="cta" href="' + esc(link) + '" target="_blank" rel="noopener">Souscrire en ligne <span class="arw">&rarr;</span></a>' +
        '<p class="note">Vous vérifiez vos informations, consultez l\'IPID et réglez par carte sur le tarificateur. Rien n\'est souscrit automatiquement par l\'application.</p>' +
      '</div>';
  }

  async function reprice(overrides) {
    if (!lastData) return;
    var args = Object.assign({}, lastData.echo_args || {}, overrides);
    var pr = document.querySelector('#app .price'); if (pr) pr.classList.add('loading');
    if (window.openai && typeof window.openai.callTool === 'function') {
      try {
        var res = await window.openai.callTool('devis_assurance_temporaire', args);
        var data = res && (res.structuredContent || (res.result && res.result.structuredContent) || res);
        if (data && (data.tarif || data.tarif_indicatif || data.hors_perimetre)) { render(data); return; }
      } catch (e) { /* on garde l'état précédent */ }
      render(lastData);
    } else if (pr) { pr.classList.remove('loading'); }
  }

  /* Sélection d'une durée (contrôle segmenté) */
  document.addEventListener('click', function (e) {
    var b = e.target && e.target.closest ? e.target.closest('.seg') : null;
    if (b && b.getAttribute('aria-pressed') !== 'true') reprice({ duree: Number(b.getAttribute('data-duree')) });
  });

  /* Navigation clavier façon radiogroup (flèches) */
  document.addEventListener('keydown', function (e) {
    var b = e.target && e.target.classList && e.target.classList.contains('seg') ? e.target : null;
    if (!b) return;
    if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft' && e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    e.preventDefault();
    var segs = Array.prototype.slice.call(b.parentNode.querySelectorAll('.seg'));
    var i = segs.indexOf(b);
    var next = (e.key === 'ArrowRight' || e.key === 'ArrowDown') ? segs[i + 1] : segs[i - 1];
    if (next) { next.focus(); reprice({ duree: Number(next.getAttribute('data-duree')) }); }
  });

  function current() { return (window.openai && window.openai.toolOutput) || null; }
  render(current() || (window.openai ? null : SAMPLE));

  window.addEventListener('message', function (e) {
    var m = e.data;
    if (m && m.jsonrpc === '2.0' && m.method === 'ui/notifications/tool-result') {
      render(m.params && m.params.structuredContent);
    }
  }, { passive: true });
  window.addEventListener('openai:set_globals', function () { render(current()); });
</script>
</body>
</html>
